<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#92400E"/>

  <!-- Subtle ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#D97706" stroke-width="0.6" opacity="0.5"/>

  <!-- North pointer (full white — dominant) -->
  <path d="M16 3.5 L19 13.5 L16 12 L13 13.5 Z" fill="#FDFAF5"/>

  <!-- South pointer (dimmed) -->
  <path d="M16 28.5 L13 18.5 L16 20 L19 18.5 Z" fill="#FDFAF5" opacity="0.45"/>

  <!-- East pointer (dimmed) -->
  <path d="M28.5 16 L18.5 13 L20 16 L18.5 19 Z" fill="#FDFAF5" opacity="0.45"/>

  <!-- West pointer (dimmed) -->
  <path d="M3.5 16 L13.5 19 L12 16 L13.5 13 Z" fill="#FDFAF5" opacity="0.45"/>

  <!-- Diagonal tick marks (45°) -->
  <rect x="15.3" y="8.2" width="1.4" height="3" rx="0.7" fill="#D97706" opacity="0.55" transform="rotate(45 16 16)"/>
  <rect x="15.3" y="8.2" width="1.4" height="3" rx="0.7" fill="#D97706" opacity="0.55" transform="rotate(135 16 16)"/>
  <rect x="15.3" y="8.2" width="1.4" height="3" rx="0.7" fill="#D97706" opacity="0.55" transform="rotate(225 16 16)"/>
  <rect x="15.3" y="8.2" width="1.4" height="3" rx="0.7" fill="#D97706" opacity="0.55" transform="rotate(315 16 16)"/>

  <!-- Center ring -->
  <circle cx="16" cy="16" r="2.8" fill="#B45309"/>
  <circle cx="16" cy="16" r="1.4" fill="#FDFAF5" opacity="0.9"/>
</svg>
